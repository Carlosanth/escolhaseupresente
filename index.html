<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login e Cadastro</title>
    <link rel="stylesheet" href="login-style.css">
    <style>
        /* Ajustes rápidos para o novo formato */
        .hidden { display: none !important; }
        .auth-wrapper {
            width: 100%;
            max-width: ;
            margin: ;
        }
    </style>
</head>
<body>
    <div class="cabecalho">
        <div class="organizacao">
            <h1 class="o">ESCOLHA SEU PRESENTE</h1>
            <p class="o">A FORMA MAIS FACIL DE CRIAR LISTA</p>
        </div>
    </div>

        <div class="carousel">
            <div class="carousel-track">
                <img src="2.png" alt="Imagem2">
                <img src="3.png" alt="Imagem3">
                <img src="4.png" alt="Imagem4">

                <img src="2.png" alt="Imagem2">
                <img src="3.png" alt="Imagem3">
                <img src="4.png" alt="Imagem4">
                <img src="5.png" alt="Imagem5">
            </div>
            <div class="carousel-track track-inverso">
                <img src="6.png" alt="Imagem2">
                <img src="7.png" alt="Imagem3">
                <img src="8.png" alt="Imagem4">
                <img src="9.png" alt="Imagem5">
                <img src="6.png" alt="Imagem2">
                <img src="7.png" alt="Imagem3">
                <img src="8.png" alt="Imagem4">
                <img src="9.png" alt="Imagem5">
            </div>        
            <div class="carousel-track">
                <img src="10.png" alt="Imagem2">
                <img src="11.png" alt="Imagem3">
                <img src="12.png" alt="Imagem4">
                <img src="5.png" alt="Imagem5">
                <img src="2.png" alt="Imagem2">
                <img src="3.png" alt="Imagem3">
                <img src="4.png" alt="Imagem4">
                <img src="5.png" alt="Imagem5">
            </div>        
        
        
        
        </div>


        <div class="container">

            <div class="area-texto">
                <div class="cabecalho">
                    <h1 class="o">ESCOLHA SEU PRESENTE</h1>
                    <p class="o">A FORMA MAIS FACIL DE CRIAR LISTA</p>
                </div>
            </div>            




            <div class="auth-wrapper">
                <div id="box-login" class="login">
                    <h1 class="e">Acessar</h1>
                    <form id="loginForm" onsubmit="event.preventDefault();">
                        <div class="formbox1">
                            <input type="email" id="loginEmail" class="form1" placeholder="Email@email.com.br" required>
                        </div>
                        <div class="formbox2">
                            <input type="password" id="loginSenha" class="form1" placeholder="Mínimo sete caracteres" required>
                        </div>
                        <div id="erro-login" class="mensagem-alerta"></div>
                        <button type="button" id="btnEntrar" class="submit-button">Entrar</button>
                        <p class="a">Ainda não tem uma conta?</p>
                        <button type="button" id="btnIrParaCadastro" class="submit-button" onclick="alternarTelas()">Cadastre-se</button>
                    </form>
                </div>

                <div id="box-cadastro" class="login hidden">
                    <h1 class="e">Cadastro</h1>
                    <form id="cadastroForm" onsubmit="event.preventDefault();">
                        <div class="formbox1">
                            <input type="email" id="cadastroEmail" class="form1" placeholder="Email@email.com.br" required>
                        </div>
                        <div class="formbox2">
                            <input type="password" id="cadastroSenha" class="form1" placeholder="Mínimo sete caracteres" required>
                        </div>
                        <div id="erro-cadastro" class="mensagem-alerta"></div>
                        <button type="button" id="btnCadastrarEfetivo" class="submit-button">Cadastrar-se</button>
                        <p class="a">Já tem uma conta?</p>
                        <button type="button" id="btnIrParaLogin" class="submit-button" onclick="alternarTelas()">Voltar para o Login</button>
                    </form>
                </div>
            </div>
        </div>









        
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDcDs0qgXdOQRnMW2mClO1kCoYmbVfeThY",
            authDomain: "escolhaseupresente-35d3d.firebaseapp.com",
            projectId: "escolhaseupresente-35d3d",
            storageBucket: "escolhaseupresente-35d3d.firebasestorage.app",
            messagingSenderId: "374767023277",
            appId: "1:374767023277:web:0a6d45cb62136ba4040224",
            measurementId: "G-DJZFYZSGMV"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Função de alternância simples
        window.alternarTelas = () => {
            document.getElementById('box-login').classList.toggle('hidden');
            document.getElementById('box-cadastro').classList.toggle('hidden');
            limparStatus();
        };

        const boxLogin = document.getElementById('box-login');
        const boxCadastro = document.getElementById('box-cadastro');
        const erroLoginDiv = document.getElementById('erro-login');
        const erroCadastroDiv = document.getElementById('erro-cadastro');

        function limparStatus() {
            erroLoginDiv.textContent = "";
            erroCadastroDiv.textContent = "";
            boxLogin.classList.remove('borda-erro');
            boxCadastro.classList.remove('borda-erro');
        }

        function tratarErro(textoErro, box, divErro) {
            divErro.textContent = textoErro;
            box.classList.add('borda-erro', 'tremer');
            setTimeout(() => box.classList.remove('tremer'), 500);
        }

        document.getElementById('btnEntrar').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value;
            const senha = document.getElementById('loginSenha').value;
            try {
                await signInWithEmailAndPassword(auth, email, senha);
                window.location.href = "cadastro.html";
            } catch (error) {
                tratarErro("E-mail ou senha incorretos.", boxLogin, erroLoginDiv);
            }
        });

        document.getElementById('btnCadastrarEfetivo').addEventListener('click', async () => {
            const email = document.getElementById('cadastroEmail').value;
            const senha = document.getElementById('cadastroSenha').value;
            try {
                await createUserWithEmailAndPassword(auth, email, senha);
                window.location.href = "cadastro.html";
            } catch (error) {
                tratarErro("Erro no cadastro: verifique os dados.", boxCadastro, erroCadastroDiv);
            }
        });
    </script>
</body>
</html>
