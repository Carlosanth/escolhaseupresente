<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login-style.css">
</head>
<body>
    <div class="flex-tela">
        <div class="login">

            <h1>Login</h1>

            <div class="form-block">
                <form id="loginForm" onsubmit="event.preventDefault();">
            
                    <div class="formbox">
                        <input type="email" id="loginEmail" class="form1" placeholder="Email" required>
                    </div>

                    <div class="formbox">
                        <input type="password" id="loginSenha" class="form1" placeholder="Senha" required>
                    </div>
                    
                    <button type="button" id="btnEntrar" class="submit-button">Entrar</button>
                    <p>Ainda não tem uma conta?</p>
                    <button type="button" id="btnCadastrar" class="submit-button">Cadastre-se</button>
                </form>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Suas credenciais do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDcDs0qgXdOQRnMW2mClO1kCoYmbVfeThY",
            authDomain: "escolhaseupresente-35d3d.firebaseapp.com",
            projectId: "escolhaseupresente-35d3d",
            storageBucket: "escolhaseupresente-35d3d.firebasestorage.app",
            messagingSenderId: "374767023277",
            appId: "1:374767023277:web:0a6d45cb62136ba4040224",
            measurementId: "G-DJZFYZSGMV"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Elementos mapeados
        const emailInput = document.getElementById('loginEmail');
        const senhaInput = document.getElementById('loginSenha');
        const btnEntrar = document.getElementById('btnEntrar');
        const btnCadastrar = document.getElementById('btnCadastrar');

        // Nome do arquivo da sua tela de cadastro de itens
        const PROXIMA_TELA = "cadastro.html"; 

        // Função para Logar
        btnEntrar.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            const senha = senhaInput.value.trim();

            if (!email || !senha) {
                alert('Preencha todos os campos.');
                return;
            }

            try {
                await signInWithEmailAndPassword(auth, email, senha);
                alert('Login realizado com sucesso!');
                window.location.href = PROXIMA_TELA; // Redireciona para a tela de cadastro de itens
            } catch (error) {
                console.error(error);
                alert('Erro ao fazer login: Verifique seu e-mail e senha.');
            }
        });

        // Função para Cadastrar novo usuário caso clique em "Cadastre-se"
        btnCadastrar.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            const senha = senhaInput.value.trim();

            if (!email || !senha) {
                alert('Digite um e-mail e senha nos campos acima para se cadastrar.');
                return;
            }

            if (senha.length < 6) {
                alert('A senha deve ter pelo menos 6 dígitos.');
                return;
            }

            try {
                await createUserWithEmailAndPassword(auth, email, senha);
                alert('Conta criada com sucesso! Redirecionando...');
                window.location.href = PROXIMA_TELA;
            } catch (error) {
                console.error(error);
                alert('Erro ao criar conta. Certifique-se de que o e-mail é válido.');
            }
        });
    </script>
</body>
</html>
