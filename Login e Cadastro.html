<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle - Lista de Presentes</title>
<style>
    /* ==========================================================================
       1. CONFIGURAÇÕES GERAIS E LAYOUT
       ========================================================================== */
    body { 
        font-family: Arial, sans-serif; 
        background-color: #f4f4f9; 
        padding: 20px; 
    }
    
    .container { 
        max-width: 600px; 
        background: white; 
        padding: 20px; 
        border-radius: 8px; 
        box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
        margin: auto; 
        margin-bottom: 20px; 
    }

    .hidden { 
        display: none !important; 
    }

    #mensagem, #loginMensagem { 
        margin-top: 15px; 
        text-align: center; 
        font-weight: bold; 
        font-size: 15px; 
    }

    /* ==========================================================================
       2. ÁREA DE AUTENTICAÇÃO E LOGOUT
       ========================================================================== */
    h2, h3 { 
        text-align: center; 
        color: #333; 
    }

    .logout-area { 
        text-align: right; 
        margin-bottom: 15px; 
        font-size: 13px; 
    }

    .logout-link { 
        color: #dc3545; 
        cursor: pointer; 
        font-weight: bold; 
        text-decoration: underline; 
    }

    /* ==========================================================================
       3. FORMULÁRIOS (CORRIGIDO PARA CENTRALIZAR OS BOTÕES)
       ========================================================================== */
    form {
        text-align: center; /* Centraliza os botões que estão soltos dentro do form */
    }

    .form-group { 
        margin-bottom: 15px;
        text-align: left; /* Mantém os inputs e labels alinhados certinhos na esquerda */
    }

    label { 
        display: block; 
        margin-bottom: 5px; 
        font-weight: bold; 
        color: #555; 
    }

    input[type="text"], 
    input[type="email"], 
    input[type="password"], 
    input[type="file"], 
    select { 
        width: 100%; 
        padding: 10px; 
        box-sizing: border-box; 
        border: 1px solid #ccc; 
        border-radius: 4px; 
        font-size: 14px; 
    }

    .opcional { 
        font-weight: normal; 
        color: #888; 
        font-size: 12px; 
    }

    /* ==========================================================================
       4. BOTÕES PRINCIPAIS (EM ROW / LADO A LADO E CENTRALIZADOS)
       ========================================================================== */
    button { 
        width: auto; /* Ocupa apenas o tamanho do texto */
        display: inline-block; /* Alinha lado a lado (row) em vez de empilhar */
        margin: 10px 6px 0 6px; /* Espaçamento de 6px nas laterais para não colarem */
        padding: 12px 28px; /* Visual elegante com mais espaço interno */
        background-color: #e91e63; 
        color: white; 
        border: none; 
        border-radius: 4px; 
        font-size: 16px; 
        cursor: pointer; 
        font-weight: bold; 
    }

    button:hover { 
        background-color: #c2185b; 
    }

    .btn-secundario { 
        background-color: #6c757d; 
        margin: 10px 6px 0 6px; /* Mantém o mesmo alinhamento do botão principal */
    }

    .btn-secundario:hover { 
        background-color: #545b62; 
    }

    /* ==========================================================================
       5. COMPONENTES: LISTA DE PRODUTOS
       ========================================================================== */
    .produto-card { 
        display: flex; 
        align-items: center; 
        justify-content: space-between; 
        padding: 12px; 
        border-bottom: 1px solid #eee; 
    }

    .produto-card img { 
        width: 50px; height: 50px; 
        object-fit: cover; 
        border-radius: 4px; 
        margin-right: 12px; 
        background-color: #eee; 
    }

    .produto-info { 
        flex-grow: 1; 
        display: flex; 
        align-items: center; 
    }

    .produto-acoes { 
        display: flex; 
        align-items: center; 
        gap: 4px; 
        flex-direction: column; 
    }

    .status-badge {
        font-size: 12px; 
        padding: 4px 8px; 
        border-radius: 12px; 
        font-weight: bold;
        text-align: center;
        min-width: 70px;
        display: inline-block;
    }

    .status-badge.disponivel {
        background-color: #e8f5e9; 
        color: #2e7d32;
    }

    .status-badge.presenteado {
        background-color: #ffebee; 
        color: #c62828;
    }

    /* Botão Excluir da lista */
    .btn-excluir-badge { 
        width: auto !important; 
        font-size: 12px; 
        padding: 4px 10px; 
        border-radius: 12px; 
        background: #ffebee; 
        color: #c62828; 
        border: none; 
        cursor: pointer; 
        font-weight: bold; 
        transition: background 0.2s; 
        min-width: 88px;
        margin: 0 !important; /* Ignora o alinhamento central dos botões do form */
    }

    .btn-excluir-badge:hover { 
        background: #fcd4d4; 
    }

    /* ==========================================================================
       6. COMPONENTES: COMPARTILHAMENTO E QR CODE
       ========================================================================== */
    .compartilhar-secao { 
        margin-top: 25px; 
        padding-top: 20px; 
        border-top: 2px dashed #eee; 
        text-align: center; /* Garante que os botões daqui também fiquem centralizados em row */
    }

    #containerQRCode { 
        margin-top: 15px; 
        display: flex; 
        justify-content: center; 
    }
</style>
</head>
<body>

<div id="autenticacaoTela" class="container">
    <h2 id="authTitulo">Acessar Painel</h2>
    <form id="authForm">
        <div class="form-group">
            <label for="email">E-mail:</label>
            <input type="email" id="email" required placeholder="seuemail@exemplo.com">
        </div>
        <div class="form-group">
            <label for="senha">Senha:</label>
            <input type="password" id="senha" required placeholder="Mínimo 6 caracteres">
        </div>
        <button type="submit" id="btnAuthPrincipal">Entrar</button>
        <button type="button" id="btnAlternarModo" class="btn-secundario">Criar uma conta</button>
    </form>
    <div id="loginMensagem"></div>
</div>

<div id="painelProdutosTela" class="container hidden">
    <div class="logout-area">
        Conta: <span id="userLogadoEmail" style="font-weight:bold;"></span> | 
        <span class="logout-link" id="linkSair">Sair</span>
    </div>

    <h2>Cadastrar Novo Item</h2>
    <form id="cadastroForm">
        <div class="form-group">
            <label for="docId">ID do Documento (Sem espaços):</label>
            <input type="text" id="docId" required placeholder="Ex: microondas_01">
        </div>
        <div class="form-group">
            <label for="titulo">Título do Produto:</label>
            <input type="text" id="titulo" required placeholder="Ex: Forno Micro-ondas 30L">
        </div>
        <div class="form-group">
            <label for="preco">Preço:</label>
            <input type="text" id="preco" required placeholder="R$ 0,00">
        </div>
        
        <div class="form-group hidden">
            <label for="preco_centavos">Preço em Centavos (Automático):</label>
            <input type="text" id="preco_centavos" required placeholder="0" readonly>
        </div>
        
        <div class="form-group">
            <label for="imagemFile">Imagem do Produto: <span class="opcional">(Opcional)</span></label>
            <input type="file" id="imagemFile" accept="image/*">
        </div>
        <div class="form-group">
            <label for="disponivel">Disponível:</label>
            <select id="disponivel">
                <option value="true" selected>Sim (true)</option>
                <option value="false">Não (false)</option>
            </select>
        </div>
        <button type="submit">Salvar Item no Perfil</button>
    </form>
    <div id="mensagem"></div>

    <div class="compartilhar-secao">
        <button type="button" id="btnCompartilhar">Compartilhar Lista</button>
        <button type="button" id="btnGerarQRCode" class="btn-secundario">Gerar QR Code</button>
        <div id="containerQRCode"></div> 
    </div>
</div>

<div id="meusItensTela" class="container hidden">
    <h3>📋 Meus Itens Cadastrados</h3>
    <div id="listaProdutosContiner">Carregando seus produtos...</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, deleteDoc, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "ja add",
        authDomain: "ja add",
        projectId: "ja add",
        storageBucket: "ja add",
        messagingSenderId: "ja add",
        appId: "ja add"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const IMGBB_API_KEY = "ja add"; 
    const URL_BASE_GITHUB = "ja add";

    let modoAutenticacao = "login";
    let usuarioAtualUid = null;
    let unsubscribeProdutos = null;
    let qrcodeInstancia = null; 

    // Elementos do DOM
    const autenticacaoTela = document.getElementById('autenticacaoTela');
    const painelProdutosTela = document.getElementById('painelProdutosTela');
    const meusItensTela = document.getElementById('meusItensTela');
    const listaProdutosContiner = document.getElementById('listaProdutosContiner');
    const userLogadoEmail = document.getElementById('userLogadoEmail');
    
    const btnCompartilhar = document.getElementById('btnCompartilhar');
    const btnGerarQRCode = document.getElementById('btnGerarQRCode');
    const containerQRCode = document.getElementById('containerQRCode');

    function gerarLinkLista() {
        return `${URL_BASE_GITHUB}?id=${usuarioAtualUid}`;
    }

    // Monitor do Estado de Autenticação
    onAuthStateChanged(auth, (user) => {
        if (user) {
            usuarioAtualUid = user.uid;
            userLogadoEmail.innerText = user.email;

            autenticacaoTela.classList.add('hidden');
            painelProdutosTela.classList.remove('hidden');
            meusItensTela.classList.remove('hidden');

            // ESCUTA EM TEMPO REAL
            const q = query(collection(db, "produtos_teste"), where("usuario_id", "==", user.uid));
            unsubscribeProdutos = onSnapshot(q, (querySnapshot) => {
                listaProdutosContiner.innerHTML = "";
                if (querySnapshot.empty) {
                    listaProdutosContiner.innerHTML = "<p style='text-align:center;color:#888;'>Você ainda não cadastrou nenhum produto.</p>";
                    return;
                }
                querySnapshot.forEach((docSnap) => {
                    const prod = docSnap.data();
                    const idDoDocumento = docSnap.id; // Pegando o ID do documento para poder deletar depois
                    
                    const itemHtml = `
                        <div class="produto-card">
                            <div class="produto-info">
                                <img src="${prod.imagem || 'https://via.placeholder.com/50'}" alt="Foto">
                                <div>
                                    <strong>${prod.titulo}</strong><br>
                                    <span style="color:#e91e63; font-weight:bold;">${prod.preco}</span>
                                </div>
                            </div>
                            <div class="produto-acoes">
                                <span class="status-badge ${prod.disponivel ? 'disponivel' : 'presenteado'}">
                                    ${prod.disponivel ? 'Disponível' : 'Presenteado'}
                                </span>
                                
                                <button type="button" class="btn-excluir-badge" data-id="${idDoDocumento}">Excluir</button>
                            </div>
                        </div>
                    `;
                    listaProdutosContiner.innerHTML += itemHtml;
                });
            });

        } else {
            usuarioAtualUid = null;
            if (unsubscribeProdutos) unsubscribeProdutos(); 
            
            containerQRCode.innerHTML = "";
            qrcodeInstancia = null;

            painelProdutosTela.classList.add('hidden');
            meusItensTela.classList.add('hidden');
            autenticacaoTela.classList.remove('hidden');
        }
    });

    // Escuta de cliques na lista de produtos (Tratando o botão de Excluir de forma dinâmica)
    listaProdutosContiner.addEventListener('click', async (e) => {
        if (e.target.classList.contains('btn-excluir-badge')) {
            const idDoc = e.target.getAttribute('data-id');
            
            // Janela de confirmação nativa do navegador
            const confirmar = confirm("Tem certeza absoluta que deseja excluir este item da sua lista?");
            
            if (confirmar) {
                try {
                    // Executa a deleção no Firebase Firestore usando o ID correto
                    await deleteDoc(doc(db, "produtos_teste", idDoc));
                    alert("Item removido com sucesso!");
                } catch (error) {
                    console.error("Erro ao deletar documento:", error);
                    alert("Não foi possível excluir o item. Verifique suas permissões.");
                }
            }
        }
    });

    // Evento de Compartilhar lista
    btnCompartilhar.addEventListener('click', async () => {
        if (!usuarioAtualUid) return;
        const linkLista = gerarLinkLista();

        if (navigator.share) {
            try {
                await navigator.share({
                    title: 'Minha Lista de Presentes',
                    text: 'Escolha um presente especial para mim na minha lista oficial!',
                    url: linkLista,
                });
            } catch (error) {
                console.log('Erro ao compartilhar:', error);
            }
        } else {
            navigator.clipboard.writeText(linkLista);
            alert('Link copiado para a área de transferência!');
        }
    });

    // Evento de Gerar QR Code
    btnGerarQRCode.addEventListener('click', () => {
        if (!usuarioAtualUid) return;
        const linkLista = gerarLinkLista();

        if (qrcodeInstancia !== null) {
            return;
        }

        qrcodeInstancia = new QRCode(containerQRCode, {
            text: linkLista,
            width: 200,
            height: 200,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
    });

    // Alternar entre Telas de Login e Registro de conta
    document.getElementById('btnAlternarModo').addEventListener('click', () => {
        document.getElementById('loginMensagem').innerText = "";
        if (modoAutenticacao === "login") {
            modoAutenticacao = "cadastro";
            document.getElementById('authTitulo').innerText = "Criar Nova Conta";
            document.getElementById('btnAuthPrincipal').innerText = "Cadastrar Conta";
            document.getElementById('btnAlternarModo').innerText = "Já tenho conta? Entrar";
        } else {
            modoAutenticacao = "login";
            document.getElementById('authTitulo').innerText = "Acessar Painel";
            document.getElementById('btnAuthPrincipal').innerText = "Entrar";
            document.getElementById('btnAlternarModo').innerText = "Criar uma conta";
        }
    });

    // Executar Autenticação
    document.getElementById('authForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const msg = document.getElementById('loginMensagem');
        msg.style.color = "black"; msg.innerText = "Processando requisição...";
        const email = document.getElementById('email').value.trim();
        const senha = document.getElementById('senha').value.trim();
        try {
            if (modoAutenticacao === "cadastro") {
                await createUserWithEmailAndPassword(auth, email, senha);
            } else {
                await signInWithEmailAndPassword(auth, email, senha);
            }
        } catch (error) {
            msg.style.color = "red"; msg.innerText = "Erro: Credenciais inválidas ou senha menor que 6 dígitos.";
        }
    });

    // Deslogar
    document.getElementById('linkSair').addEventListener('click', () => { signOut(auth); });

    // Máscara de Preço em Tempo Real
    const precoInput = document.getElementById('preco');
    const centavosInput = document.getElementById('preco_centavos');
    precoInput.addEventListener('input', (e) => {
        let value = e.target.value.replace(/\D/g, "");
        if (value === "") { precoInput.value = ""; centavosInput.value = ""; return; }
        centavosInput.value = value;
        precoInput.value = (Number(value) / 100).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    });

    // Envio do Formulário de Itens
    document.getElementById('cadastroForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const msgDiv = document.getElementById('mensagem');
        msgDiv.style.color = "black"; msgDiv.innerText = "Iniciando processamento...";

        const docId = document.getElementById('docId').value.trim();
        const titulo = document.getElementById('titulo').value.trim();
        const precoFinal = precoInput.value.trim();
        const preco_centavos = centavosInput.value.trim();
        const imagemFileInput = document.getElementById('imagemFile');
        const disponivel = document.getElementById('disponivel').value === "true";

        let linkDaImagem = "";
        try {
            if (imagemFileInput.files.length > 0) {
                msgDiv.innerText = "Subindo arquivo de imagem para o ImgBB...";
                const formData = new FormData();
                formData.append("image", imagemFileInput.files[0]);
                
                const imgbb = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData });
                const res = await imgbb.json();
                if (res.success) {
                    linkDaImagem = res.data.url;
                } else {
                    throw new Error("Falha ao carregar imagem.");
                }
            }

            msgDiv.innerText = "Gravando produto no Firebase...";

            await setDoc(doc(db, "produtos_teste", docId), {
                titulo: titulo, 
                preco: precoFinal, 
                preco_centavos: preco_centavos,
                imagem: linkDaImagem, 
                disponivel: disponivel, 
                usuario_id: usuarioAtualUid
            });

            msgDiv.style.color = "green"; msgDiv.innerText = "Sucesso! Produto cadastrado e listado abaixo.";
            document.getElementById('cadastroForm').reset();
        } catch (error) {
            console.error(error);
            msgDiv.style.color = "red"; msgDiv.innerText = "Erro ao processar o cadastro do item.";
        }
    });
</script>
</body>
</html>
