<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="cadastro-style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        .modal-qr {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center; align-items: center;
            z-index: 1000;
            font-family: sans-serif;
        }
        .modal-qr-content {
            background: white; padding: 20px;
            border-radius: 12px; text-align: center;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
            max-width: 300px; width: 90%;
        }
        .modal-qr-content h4 { margin-top: 0; color: #333; }
        #canvas-qrcode { margin: 15px auto; display: flex; justify-content: center; }
        .btn-qr-action {
            background: #007bff; color: white; border: none;
            padding: 8px 16px; border-radius: 6px;
            cursor: pointer; font-weight: bold; margin: 5px;
        }
        .btn-qr-fechar { background: #6c757d; }

        /* ===== CARROSEL ===== */
        .carousel-box {
            position: relative;
            width: 90%;
            max-width: 320px;
            margin: 0 auto;
            background: rgb(145 120 248);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 14px 10px 12px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .carousel-track-outer {
            width: 100%;
            overflow: hidden;
        }

        .carousel-track {
            display: flex;
            gap: 10px;
            transition: transform 0.4s cubic-bezier(.4,0,.2,1);
            will-change: transform;
        }

        .carousel-slide {
            flex: 0 0 calc(100% - 60px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            border-radius: 8px;
            overflow: hidden;
            transition: opacity 0.4s, transform 0.4s, outline 0.2s;
            background: rgba(255,255,255,0.1);
            padding-bottom: 6px;
            cursor: pointer;
        }

        .carousel-slide img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 7px;
            margin-top: 6px;
        }

        .carousel-slide span {
            margin-top: 5px;
            font-size: 14px;
            color: #ffffff;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .carousel-slide.inactive {
            opacity: 0.5;
            transform: scale(0.92);
        }

        .carousel-slide.active {
            opacity: 1;
            transform: scale(1);
        }

        .carousel-slide.selecionado {
            outline: 3px solid #fff;
        }

        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 10px;
        }

        .carousel-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            border: none;
            cursor: pointer;
            padding: 0;
            transition: background 0.3s, transform 0.2s;
        }

        .carousel-dot.active {
            background: #fff;
            transform: scale(1.2);
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-70%);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            transition: background 0.2s;
        }
        .carousel-btn:hover { background: rgba(255,255,255,0.35); }
        #carousel-prev { left: 6px; }
        #carousel-next { right: 6px; }

        .carousel-loading {
            color: #fff;
            font-size: 13px;
            text-align: center;
            padding: 20px 0;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="nav">
        <div class="nav-itens">
            <div id="usuario-barra">
                <span id="userLogadoEmail" style="font-weight: bold;">Carregando usuário...</span>
                <button id="btnSair">Sair</button>
            </div>
            <button class="btn-tema" id="tema">TEMAS DA LISTA</button>   
        </div>
    </div>

    <div class="cartao">
        <div class="area-temas">
            <button class="fechar" id="fechar" style="border-radius: 50px 50px;">Fechar</button>
            <div class="painel">
                <span class="nome-i" style="padding-bottom: 20px; font-size: 25px; font-weight: 600;">Esolha imagem inical</span>
                <div class="painel-de-imagens" style="margin-bottom: 20px;">
                    <div class="painel-incial">

                        <div class="carousel-box">
                            <div class="carousel-track-outer">
                                <div class="carousel-track" id="carouselTrack">
                                    <!-- Imagens carregadas dinamicamente do Firebase -->
                                    <div class="carousel-loading">Carregando temas...</div>
                                </div>
                            </div>

                            <!-- Bolinhas -->
                            <div class="carousel-dots" id="carouselDots"></div>

                            <!-- Setas -->
                            <button class="carousel-btn" id="carousel-prev" aria-label="Anterior">
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="15 18 9 12 15 6"/>
                                </svg>
                            </button>
                            <button class="carousel-btn" id="carousel-next" aria-label="Próximo">
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="9 18 15 12 9 6"/>
                                </svg>
                            </button>
                        </div>

                    </div>
                </div>
                <span class="painel-up">Ou faça Uploand</span>
                <input type="file" name="upload" id="upload" class="upload">
                <div class="adicionar-cores">
                    <div class="cores">
                        <div id="escolher">Escolha acor de sua lista</div>

            </div>
        </div>    
        <div class="cardbox">
            <div class="box">
                <h1> Cadastre seu itens</h1>
                <div class="boxlabal">
                    <div class="nomeitem">
                        <div class="nome">Inserir nome do item</div>
                        <input type="text" id="nomeProduto" class="campo-formulario" placeholder="Qual o nome do item?">
                    </div>
                    
                    <div class="preço">
                        <div class="nome">Inserir valor</div>
                        <input type="tel" id="precoProduto" class="campo-formulario" placeholder="R$ 0,00">
                    </div>
                    
                    <div class="categoria">
                        <div class="nome">Inserir categoria <span>(Opcional)</span></div>
                        <select id="selectCategoria" class="campo-formulario" style="width: 100%; padding: 10px; border-radius: 4px; margin-bottom: 8px;">
                            <option value="">Selecione uma categoria...</option>
                            <option value="MANUAL">➕ Adicionar nova categoria (Manual)...</option>
                        </select>
                        <input type="text" id="categoriaManual" class="campo-formulario" placeholder="Digite a nova categoria aqui" style="display: none;">
                    </div>
                    
                    <div class="Carregar-arquivo">
                        <div class="nome">Inserir imagem do produto</div>
                        <input type="file" id="fotoProduto" class="arquivo" accept="image/*">
                    </div>
                </div>
                <div class="salva-it">
                    <input type="button" name="Savar" class="int" id="Savar" value="Adicionar item" />
                </div>
                <div class="comp-qr">
                    <div class="compart-link">
                        <input type="button" name="compartilhar" id="compartilhar" class="compartilhar" value="Compartilhar link">
                    </div>
                    <div class="qr">
                        <input type="button" name="qrcode" id="qrcode" class="qrcode" value="Gerar QrCode">
                    </div>
                </div>
            </div>
            
            <div class="itenscadastrados">
                <h3>📋 Meus Itens Cadastrados</h3>
                <div id="registros"></div>
            </div>
        </div>
    </div>

    <div id="modalQR" class="modal-qr">
        <div class="modal-qr-content">
            <h4>Seu QR Code da Lista</h4>
            <div id="canvas-qrcode"></div>
            <button id="btnBaixarQR" class="btn-qr-action">Baixar Imagem</button>
            <button id="btnFecharQR" class="btn-qr-action btn-qr-fechar">Fechar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, deleteDoc, getDocs, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDcDs0qgXdOQRnMW2mClO1kCoYmbVfeThY",
            authDomain: "escolhaseupresente-35d3d.firebaseapp.com",
            projectId: "escolhaseupresente-35d3d",
            storageBucket: "escolhaseupresente-35d3d.firebasestorage.app",
            messagingSenderId: "374767023277",
            appId: "1:374767023277:web:0a6d45cb62136ba4040224",
            measurementId: "G-DJZFYZSGMV"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const IMGBB_API_KEY = "a6dd2e7549451f9117ecd2a25dd8765d"; 
        const URL_BASE_SITE = "https://carlosanth.github.io/escolhaseupresente/lista.html";

        let usuarioAtualUid = null;
        let unsubscribeProdutos = null;
        let unsubscribeCategorias = null;
        let imagemSelecionadaParaO_Banco = "";

        const btnAdicionar = document.getElementById('Savar');
        const inputNome = document.getElementById('nomeProduto');
        const inputPreco = document.getElementById('precoProduto');
        const selectCategoria = document.getElementById('selectCategoria');
        const inputCategoriaManual = document.getElementById('categoriaManual');
        const inputFoto = document.getElementById('fotoProduto');
        const containerRegistros = document.getElementById('registros');
        const userLogadoEmail = document.getElementById('userLogadoEmail');
        const btnSair = document.getElementById('btnSair');

        const modalQR = document.getElementById('modalQR');
        const canvasQR = document.getElementById('canvas-qrcode');
        const btnFecharQR = document.getElementById('btnFecharQR');
        const btnBaixarQR = document.getElementById('btnBaixarQR');
        let qrcodeInstancia = null;

        // ================================================================
        // CARROSEL — carrega do Firebase e inicializa
        // ================================================================
        async function carregarImagensCarrosel() {
            const track = document.getElementById('carouselTrack');
            const dotsContainer = document.getElementById('carouselDots');
            if (!track || !dotsContainer) return;

            try {
                const snapshot = await getDocs(collection(db, "temas"));

                track.innerHTML = '';
                dotsContainer.innerHTML = '';

                if (snapshot.empty) {
                    track.innerHTML = '<div class="carousel-loading">Nenhum tema cadastrado.</div>';
                    return;
                }

                const temas = [];
                snapshot.forEach(docSnap => temas.push(docSnap.data()));

                // Ordena pelo campo "ordem" se existir
                temas.sort((a, b) => (a.ordem ?? 99) - (b.ordem ?? 99));

                // Cria os slides
                temas.forEach((tema, i) => {
                    const slide = document.createElement('div');
                    slide.className = 'carousel-slide ' + (i === 0 ? 'active' : 'inactive');
                    slide.dataset.url = tema.url;
                    slide.innerHTML = `
                        <img src="${tema.url}" alt="${tema.nome || 'Tema'}">
                        <span>${tema.nome || ''}</span>
                    `;
                    track.appendChild(slide);

                    // Bolinha
                    const dot = document.createElement('button');
                    dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
                    dot.setAttribute('aria-label', 'Slide ' + (i + 1));
                    dot.addEventListener('click', () => carouselGoTo(i));
                    dotsContainer.appendChild(dot);
                });

                inicializarCarrosel();

            } catch (err) {
                console.error("Erro ao carregar temas:", err);
                track.innerHTML = '<div class="carousel-loading">Erro ao carregar temas.</div>';
            }
        }

        function inicializarCarrosel() {
            const track = document.getElementById('carouselTrack');
            const dotsContainer = document.getElementById('carouselDots');
            if (!track) return;

            let current = 0;

            window.carouselGoTo = function(n) {
                const slides = Array.from(track.querySelectorAll('.carousel-slide'));
                if (!slides.length) return;

                current = (n + slides.length) % slides.length;
                const slideW = slides[0].offsetWidth + 10;
                track.style.transform = `translateX(${-current * slideW + 30}px)`;

                slides.forEach((s, i) => {
                    s.className = 'carousel-slide ' + (i === current ? 'active' : 'inactive');
                    // mantém borda se estiver selecionado
                    if (s.dataset.selecionado === 'true') s.classList.add('selecionado');
                });

                Array.from(dotsContainer.children).forEach((d, i) => {
                    d.className = 'carousel-dot' + (i === current ? ' active' : '');
                });
            };

            document.getElementById('carousel-prev').addEventListener('click', () => {
                const slides = track.querySelectorAll('.carousel-slide');
                carouselGoTo(current - 1);
            });
            document.getElementById('carousel-next').addEventListener('click', () => {
                carouselGoTo(current + 1);
            });

            // Swipe touch
            let startX = 0;
            track.addEventListener('touchstart', e => { startX = e.touches[0].clientX; });
            track.addEventListener('touchend', e => {
                const diff = startX - e.changedTouches[0].clientX;
                if (Math.abs(diff) > 40) carouselGoTo(current + (diff > 0 ? 1 : -1));
            });

            // Clique no slide → escolhe como tema
            track.addEventListener('click', (e) => {
                const slide = e.target.closest('.carousel-slide');
                if (!slide) return;

                const url = slide.dataset.url;
                if (!url) return;

                mudarImagemTemaEmTempoReal(url);

                // Feedback visual
                track.querySelectorAll('.carousel-slide').forEach(s => {
                    s.classList.remove('selecionado');
                    s.dataset.selecionado = 'false';
                });
                slide.classList.add('selecionado');
                slide.dataset.selecionado = 'true';
            });

            carouselGoTo(0);
        }
        // ================================================================

        document.addEventListener('DOMContentLoaded', () => {
            const botaoTema = document.getElementById('tema');
            const areaTemas = document.querySelector('.area-temas');
            const botaoSair = document.getElementById('fechar');
            
            if (botaoTema) {
                botaoTema.addEventListener('click', () => {
                    areaTemas.classList.toggle('ativo');
                });
            }

            if (botaoSair) {
                botaoSair.addEventListener('click', () => {
                    areaTemas.classList.remove('ativo');
                });
            }

            // Upload de imagem do tema
            const inputUploadTema = document.getElementById('upload');
            if (inputUploadTema) {
                inputUploadTema.addEventListener('change', async (e) => {
                    const arquivo = e.target.files[0];
                    if (arquivo) {
                        const spanUpload = document.querySelector('.painel-up');
                        let textoOriginalSpan = spanUpload ? spanUpload.textContent : "Ou faça Uploand";
                        if (spanUpload) spanUpload.textContent = "Enviando imagem...";
                        
                        const urlGerada = await fazerUploadImagemImgBB(arquivo);
                        
                        if (urlGerada) {
                            mudarImagemTemaEmTempoReal(urlGerada);
                            if (spanUpload) spanUpload.textContent = "Upload concluído!";
                        } else {
                            if (spanUpload) spanUpload.textContent = textoOriginalSpan;
                        }
                    }
                });
            }
        });

        function mudarImagemTemaEmTempoReal(urlDaImagem) {
            imagemSelecionadaParaO_Banco = urlDaImagem;
            const telaBoasVindas = document.querySelector('.tela-boas-vindas');
            if (telaBoasVindas) {
                telaBoasVindas.style.backgroundImage = `linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.55)), url('${urlDaImagem}')`;
            }
        }

        inputPreco.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, ""); 
            if (!value) { e.target.value = ""; return; }
            value = (parseFloat(value) / 100).toFixed(2); 
            e.target.value = "R$ " + value.replace(".", ",").replace(/(\d)(?=(\d{3})+(?!\d))/g, "$1.");
        });

        selectCategoria.addEventListener('change', () => {
            if (selectCategoria.value === 'MANUAL') {
                inputCategoriaManual.style.display = 'block';
                inputCategoriaManual.focus();
            } else {
                inputCategoriaManual.style.display = 'none';
                inputCategoriaManual.value = '';
            }
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                usuarioAtualUid = user.uid;
                userLogadoEmail.textContent = `${user.email}`;
                escutarProdutosDoBanco();
                escutarCategoriasDoBanco();
                carregarImagensCarrosel(); // carrega temas após login
            } else {
                usuarioAtualUid = null;
                userLogadoEmail.textContent = "Não autenticado";
                containerRegistros.innerHTML = '<p style="padding:10px;">Redirecionando...</p>';
                if (unsubscribeProdutos) unsubscribeProdutos();
                if (unsubscribeCategorias) unsubscribeCategorias();
                window.location.href = "index.html"; 
            }
        });

        btnSair.addEventListener('click', async () => {
            if(confirm("Deseja realmente sair da sua conta?")) {
                try { await signOut(auth); } catch (error) { console.error("Erro ao deslogar:", error); }
            }
        });

        function escutarCategoriasDoBanco() {
            try {
                unsubscribeCategorias = onSnapshot(collection(db, "categorias"), (querySnapshot) => {
                    selectCategoria.innerHTML = '<option value="">Selecione uma categoria...</option><option value="MANUAL">➕ Adicionar nova categoria (Manual)...</option>';
                    querySnapshot.forEach((docSnap) => {
                        const catData = docSnap.data();
                        const nomeCategoria = catData.nome || docSnap.id; 
                        if (nomeCategoria) {
                            const novaOpcao = document.createElement('option');
                            novaOpcao.value = nomeCategoria;
                            novaOpcao.textContent = nomeCategoria;
                            selectCategoria.insertBefore(novaOpcao, selectCategoria.lastElementChild);
                        }
                    });
                });
            } catch (err) { console.error("Erro ao buscar categorias:", err); }
        }

        async function fazerUploadImagemImgBB(arquivoObjeto) {
            const formData = new FormData();
            formData.append("image", arquivoObjeto);
            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData });
                const data = await response.json();
                if (data.success) return data.data.url;
                else throw new Error("Falha no upload do ImgBB");
            } catch (error) {
                console.error("Erro no upload da imagem:", error);
                return 'https://i.ibb.co/FqHbGwfs/189697.png';
            }
        }

        btnAdicionar.addEventListener('click', async () => {
            const nome = inputNome.value.trim();
            const precoRaw = inputPreco.value.trim();
            const fotoArquivo = inputFoto.files[0];

            let category = selectCategoria.value;
            if (category === 'MANUAL') category = inputCategoriaManual.value.trim();

            if (!usuarioAtualUid) { alert('Você precisa estar logado para cadastrar itens.'); return; }
            if (!nome || !precoRaw) { alert('Por favor, preencha o Nome e o Valor do item.'); return; }

            const precoNumerico = parseFloat(precoRaw.replace("R$ ", "").replace(/\./g, "").replace(",", "."));
            const precoCentavos = Math.round(precoNumerico * 100);

            btnAdicionar.value = "Salvando...";
            btnAdicionar.disabled = true;

            let urlImagemFinal = 'https://i.ibb.co/0jjSyNRG/logo.png';
            if (fotoArquivo) urlImagemFinal = await fazerUploadImagemImgBB(fotoArquivo);

            const categoriaLimpa = (category || "SemCategoria").replace(/[\/#\$\.\[\]]/g, "").trim();
            const nomeLimpo = nome.replace(/[\/#\$\.\[\]]/g, "").trim();
            const produtoId = `${categoriaLimpa}-${nomeLimpo}`;

            try {
                await setDoc(doc(db, "produtos_teste", produtoId), {
                    categoria: category || "Sem Categoria",
                    disponivel: true, 
                    imagem: urlImagemFinal,   
                    preco: precoRaw,          
                    preco_centavos: precoCentavos.toString(), 
                    titulo: nome,             
                    usuario_id: usuarioAtualUid
                });

                if (selectCategoria.value === 'MANUAL' && category) {
                    await setDoc(doc(db, "categorias", categoriaLimpa), { nome: category });
                }
                limparFormulario();
            } catch (error) {
                console.error("Erro ao salvar no Firestore:", error);
                alert('Erro ao salvar o item no banco de dados.');
            } finally {
                btnAdicionar.value = "Adicionar item";
                btnAdicionar.disabled = false;
            }
        });

        function escutarProdutosDoBanco() {
            const q = query(collection(db, "produtos_teste"), where("usuario_id", "==", usuarioAtualUid));
            unsubscribeProdutos = onSnapshot(q, (querySnapshot) => {
                containerRegistros.innerHTML = ''; 
                if (querySnapshot.empty) {
                    containerRegistros.innerHTML = '<p style="padding:10px; opacity:0.7;">Nenhum item cadastrado ainda.</p>';
                    return;
                }
                querySnapshot.forEach((docSnap) => renderizarItemNaTela(docSnap.data(), docSnap.id));
            });
        }

        function renderizarItemNaTela(produto, documentoId) {
            const novaBaseDiv = document.createElement('div');
            novaBaseDiv.classList.add('base');

            const tituloExibição = produto.titulo || "Sem nome";
            const precoExibição = produto.preco || "R$ 0,00";
            const imagemExibição = produto.imagem || 'https://i.ibb.co/0jjSyNRG/logo.png';
            const categoriaExibicao = produto.categoria || "Sem Categoria";
            const textoStatus = produto.disponivel !== false ? "Disponível" : "Indisponível";
            const corStatus = produto.disponivel !== false ? "#28a745" : "#6c757d"; 

            novaBaseDiv.innerHTML = `
                <div class="base-card">
                    <img src="${imagemExibição}" alt="foto">
                    <div class="T-Produtos">
                        <strong>${tituloExibição}</strong>
                        <span>${precoExibição}</span>
                        <small style="display:block; font-size:11px; opacity:0.6;">Cat: ${categoriaExibicao}</small>
                    </div>
                </div>
                <div class="disponibilidade">
                    <text class="disp" style="color: ${corStatus}; font-weight: bold;">${textoStatus}</text>
                    <text class="excl" style="cursor:pointer;">Excluir</text>
                </div>
            `;

            novaBaseDiv.querySelector('.excl').addEventListener('click', async () => {
                if (confirm(`Deseja realmente excluir "${tituloExibição}"?`)) {
                    try { await deleteDoc(doc(db, "produtos_teste", documentoId)); } 
                    catch (error) { console.error("Erro ao deletar item:", error); alert("Não foi possível excluir o item."); }
                }
            });

            containerRegistros.appendChild(novaBaseDiv);
        }

        function limparFormulario() {
            inputNome.value = '';
            inputPreco.value = '';
            selectCategoria.value = '';
            inputCategoriaManual.value = '';
            inputCategoriaManual.style.display = 'none';
            inputFoto.value = '';
        }

        document.getElementById('compartilhar').addEventListener('click', async () => {
            if (!usuarioAtualUid) return alert('Faça login primeiro.');
            const linkLista = `${URL_BASE_SITE}?id=${usuarioAtualUid}`;
            if (navigator.share) {
                try { await navigator.share({ title: 'Minha Lista de Casamento', text: 'Escolha um presente especial para nós!', url: linkLista }); } 
                catch (error) { console.log('Compartilhamento cancelado', error); }
            } else {
                navigator.clipboard.writeText(linkLista);
                alert('Link copiado para a área de transferência!');
            }
        });

        document.getElementById('qrcode').addEventListener('click', () => {
            if (!usuarioAtualUid) return alert('Faça login primeiro.');
            const linkLista = `${URL_BASE_SITE}?id=${usuarioAtualUid}`;
            canvasQR.innerHTML = "";
            modalQR.style.display = "flex";
            qrcodeInstancia = new QRCode(canvasQR, { text: linkLista, width: 180, height: 180 });
        });

        btnFecharQR.addEventListener('click', () => { modalQR.style.display = "none"; });

        btnBaixarQR.addEventListener('click', () => {
            const imgElement = canvasQR.querySelector('img');
            if (imgElement && imgElement.src) {
                const linkDownload = document.createElement('a');
                linkDownload.href = imgElement.src;
                linkDownload.download = 'qrcode-lista-presentes.png';
                linkDownload.click();
            } else {
                alert('Aguarde o QR Code carregar totalmente para baixar.');
            }
        });

        // ================================================================
        // SALVAR COR E IMAGEM DO TEMA
        // ================================================================
        const btnSalvarPreferencias = document.getElementById('btn-salvar');
        const inputCorTema = document.querySelector('.cor');

        if (btnSalvarPreferencias) {
            btnSalvarPreferencias.addEventListener('click', async () => {
                if (!usuarioAtualUid) { alert('Você precisa estar logado para salvar as preferências.'); return; }

                const corEscolhida = inputCorTema.value;
                const textoOriginal = btnSalvarPreferencias.innerHTML;
                btnSalvarPreferencias.innerHTML = "Salvando...";
                btnSalvarPreferencias.disabled = true;

                try {
                    const dadosParaSalvar = { cor_tema: corEscolhida };
                    if (imagemSelecionadaParaO_Banco !== "") {
                        dadosParaSalvar.imagem_fundo = imagemSelecionadaParaO_Banco;
                    }

                    await setDoc(doc(db, "configuracoes", usuarioAtualUid), dadosParaSalvar, { merge: true });
                    alert('Preferências salvas com sucesso!');
                    
                    const areaTemas = document.querySelector('.area-temas');
                    if (areaTemas) areaTemas.classList.remove('ativo');

                } catch (error) {
                    console.error("Erro ao salvar preferências no Firestore:", error);
                    alert('Erro ao salvar as preferências do tema.');
                } finally {
                    btnSalvarPreferencias.innerHTML = textoOriginal;
                    btnSalvarPreferencias.disabled = false;
                }
            });
        }
        // ================================================================

    </script>
</body>
</html>
